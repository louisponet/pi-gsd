# ralphi configuration
# Auto-generated - edit as needed

project:
  name: "pi-gsd"
  language: "TypeScript"
  type: "pi-package"
  status: "TS port complete"

commands:
  # Type-check without emitting
  typecheck: "npx tsc --noEmit"

  # Build the bundled dist/gsd-tools.js
  build: "npm run build"

  # Model-profiles markdown must stay in sync with model-profiles.cjs across all 8 harnesses
  # NOTE: validate requires assembled harnesses - run manually before publish, not pre-commit
  # validate: "node scripts/validate-model-profiles.cjs"

  # Full cross-harness integrity suite - run before publishing
  # check: "node scripts/validate-harness-sync.cjs"

  # Assemble .gsd/harnesses/ for npm publish
  # build: "node scripts/build-harnesses.js --clean"

rules:
  - "Tier-1 binary modules (frontmatter.cjs, milestone.cjs, model-profiles.cjs, roadmap.cjs, security.cjs, state.cjs, template.cjs, uat.cjs, init.cjs) must stay byte-identical across all 8 harnesses"
  - "Tier-2 modules vary by harness - however, we only support pi"
  - "Hook files in .pi/ only"
  - "The /gsd:<name> colon-prefix is an internal Claude/Gemini dispatch mechanism - never emit it in generated artefacts, ROADMAP entries, or error messages"
  - "We publish skills/ and scripts/ - the package.json 'files' field controls what ships; don't add harness runtime files to it"
  - "*.lock and .env* files must never be touched"

boundaries:
  never_touch:
    - "*.lock"
    - ".env*"
    - ".git/hooks/*"

engine: "pi"
max_retries: 3
pre_commit: "prek"
